<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TantrShell | Smart Tech. Ready to Deploy.</title>
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Primary SEO -->
  <meta name="description"
    content="TantrShell builds smart, customizable tech products and trains businesses to use them effectively. From hospital management to AI bots — ready to deploy." />
  <meta name="keywords"
    content="TantrShell, tech startup, digital solutions, business automation, prebuilt products, training, SaaS, white-label, hospital management, school ERP, CRM, AI support bot" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://tantrshell.online/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tantrshell.online/" />
  <meta property="og:title" content="TantrShell | Smart Tech. Ready to Deploy." />
  <meta property="og:description" content="Build, Launch, Train &amp; Scale with ready-made digital solutions. TantrShell — smart tech for businesses that mean it." />
  <meta property="og:image" content="https://tantrshell.online/logo.png" />
  <meta property="og:site_name" content="TantrShell" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TantrShell | Smart Tech. Ready to Deploy." />
  <meta name="twitter:description" content="Build, Launch, Train &amp; Scale with ready-made digital solutions." />
  <meta name="twitter:image" content="https://tantrshell.online/logo.png" />

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "TantrShell",
    "url": "https://tantrshell.online",
    "logo": "https://tantrshell.online/logo.png",
    "description": "TantrShell builds smart, customizable tech products and trains businesses to use them effectively.",
    "email": "tantrshell.hr@gmail.com",
    "sameAs": [
      "https://www.linkedin.com/company/tantrshell/",
      "https://www.facebook.com/tantrshell",
      "https://www.instagram.com/tantrshell"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "email": "tantrshell.hr@gmail.com",
      "contactType": "customer service",
      "availableLanguage": ["English", "Hindi"]
    }
  }
  </script>

  <!-- Structured Data: WebSite (Sitelinks Searchbox) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "TantrShell",
    "url": "https://tantrshell.online",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://tantrshell.online/products?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>

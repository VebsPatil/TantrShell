<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="msvalidate.01" content="E451AB93E1029E6C9637E9A79A17924D" />
  <!-- Default Title (overridden per-page by React Helmet) -->
  <title>TantrShell | Smart Tech. Ready to Deploy.</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <!-- Primary SEO Defaults (overridden by Helmet per page) -->
  <meta name="description"
    content="TantrShell builds smart, customizable tech products and trains businesses to use them effectively. From hospital management to AI bots — ready to deploy." />
  <meta name="keywords"
    content="TantrShell, tech startup, digital solutions, business automation, prebuilt products, training, SaaS, white-label, hospital management, school ERP, CRM, AI support bot, Pune, India" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <link rel="canonical" href="https://tantrshell.online/" />

  <!-- Author & Publisher -->
  <meta name="author" content="TantrShell Technologies" />
  <meta name="publisher" content="TantrShell Technologies" />
  <meta name="theme-color" content="#FF4D00" />
  <meta name="format-detection" content="telephone=no" />
  <meta http-equiv="content-language" content="en" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tantrshell.online/" />
  <meta property="og:title" content="TantrShell | Smart Tech. Ready to Deploy." />
  <meta property="og:description"
    content="Build, Launch, Train & Scale with ready-made digital solutions. TantrShell — smart tech for businesses that mean it." />
  <meta property="og:image" content="https://tantrshell.online/logo.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="TantrShell" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TantrShell | Smart Tech. Ready to Deploy." />
  <meta name="twitter:description" content="Build, Launch, Train & Scale with ready-made digital solutions." />
  <meta name="twitter:image" content="https://tantrshell.online/logo.png" />
  <meta name="twitter:site" content="@tantrshell" />

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "TantrShell",
    "alternateName": "TantrShell Technologies",
    "url": "https://tantrshell.online",
    "logo": "https://tantrshell.online/logo.png",
    "description": "TantrShell builds smart, customizable tech products and trains businesses to use them effectively.",
    "email": "hr.tantrshell@gmail.com",
    "foundingDate": "2020",
    "foundingLocation": {
      "@type": "Place",
      "name": "Pune, Maharashtra, India"
    },
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Akurdi Railway Station Building, No. 19-03",
      "addressLocality": "Pune",
      "addressRegion": "Maharashtra",
      "postalCode": "411044",
      "addressCountry": "IN"
    },
    "sameAs": [
      "https://www.linkedin.com/company/tantrshell/",
      "https://www.facebook.com/tantrshell",
      "https://www.instagram.com/tantrshell"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "email": "hr.tantrshell@gmail.com",
      "contactType": "customer service",
      "availableLanguage": ["English", "Hindi", "Marathi"]
    },
    "numberOfEmployees": {
      "@type": "QuantitativeValue",
      "minValue": 11,
      "maxValue": 50
    },
    "knowsAbout": [
      "ERP Systems", "CRM Solutions", "Hospital Management Software",
      "School ERP", "E-Commerce Development", "AI Chatbots",
      "Business Automation", "Web Development", "SaaS Products"
    ]
  }
  </script>

  <!-- Structured Data: WebSite (Sitelinks Searchbox) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "TantrShell",
    "url": "https://tantrshell.online",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://tantrshell.online/products?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Fonts (preconnect for performance) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />

  <!-- DNS Prefetch for external resources -->
  <link rel="dns-prefetch" href="//fonts.googleapis.com" />
  <link rel="dns-prefetch" href="//fonts.gstatic.com" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
